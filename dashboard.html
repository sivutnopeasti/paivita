<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Sivutnopeasti</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:       #1e5bb5;
      --primary-light: #3a7bd5;
      --primary-dark:  #0d3a7a;
      --accent:        #00c6ff;
      --orange:        #d97706;
      --red:           #dc2626;
      --text:          #1a1a2e;
      --text-light:    #4a5568;
      --bg:            #f0f4f8;
      --card:          #ffffff;
      --border:        #e2e8f0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1,h2,h3,button { font-family: 'Montserrat', sans-serif; }

    /* ── Topbar ── */
    .topbar {
      height: 52px;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: #fff;
      display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem;
      font-weight: 700; font-size: 1.05rem;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
    .logout-btn {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 0.25rem 0.85rem; border-radius: 6px;
      font-size: 0.8rem; cursor: pointer; font-family: 'Open Sans', sans-serif;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.28); }

    /* ── Login overlay ── */
    .login-overlay {
      position: fixed; inset: 0; z-index: 100; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: var(--card); border-radius: 16px; padding: 2.5rem;
      width: 400px; max-width: 94vw;
      box-shadow: 0 8px 32px rgba(30,91,181,0.13);
      border: 1px solid var(--border);
    }
    .login-card h2 { font-size: 1.25rem; color: var(--text); margin-bottom: 0.3rem; }
    .login-card p  { font-size: 0.85rem; color: var(--text-light); margin-bottom: 1.5rem; line-height: 1.55; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-light); margin-bottom: 0.35rem; letter-spacing: 0.02em;
    }
    .form-group input {
      width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.95rem; font-family: 'Open Sans', sans-serif;
      color: var(--text); transition: border-color 0.15s;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30,91,181,0.11); }
    .btn-primary {
      width: 100%; padding: 0.75rem; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem; font-family: 'Montserrat', sans-serif;
      font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-primary:active { transform: scale(0.98); }
    .login-status { font-size: 0.83rem; margin-top: 0.75rem; min-height: 1.2rem; }
    .login-status.error { color: var(--red); }

    /* ── Main content ── */
    .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .toolbar h1 { font-size: 1.1rem; color: var(--text); }
    .customer-count { font-size: 0.8rem; color: var(--text-light); font-weight: 400; }
    .spacer { flex: 1; }
    .search-input {
      padding: 0.5rem 0.875rem; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.88rem; font-family: 'Open Sans', sans-serif; color: var(--text);
      width: 200px; transition: border-color 0.15s;
    }
    .search-input:focus { outline: none; border-color: var(--primary); }
    .refresh-btn {
      padding: 0.5rem 1rem; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.85rem; cursor: pointer; font-family: 'Open Sans', sans-serif;
      color: var(--text); transition: border-color 0.15s, background 0.15s; white-space: nowrap;
    }
    .refresh-btn:hover { border-color: var(--primary); background: #f0f4ff; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Loading bar ── */
    .loading-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1rem; overflow: hidden; display: none; }
    .loading-bar.active { display: block; }
    .loading-bar-fill { height: 100%; background: var(--primary); animation: slide 1.2s ease-in-out infinite; }
    @keyframes slide {
      0%   { width: 0%; margin-left: 0%; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--card); border-radius: 12px;
      border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8fafc; }
    thead th {
      padding: 0.85rem 1rem; text-align: left; font-size: 0.78rem;
      font-weight: 700; color: var(--text-light); letter-spacing: 0.04em;
      text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    thead th.sortable { cursor: pointer; user-select: none; }
    thead th.sortable:hover { color: var(--primary); }
    thead th .sort-icon { margin-left: 0.25rem; opacity: 0.5; }
    thead th.active .sort-icon { opacity: 1; color: var(--primary); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafd; }
    td { padding: 0.875rem 1rem; font-size: 0.875rem; vertical-align: middle; }

    /* ── Cells ── */
    .company-name { font-weight: 600; color: var(--text); }
    .company-sub  { font-size: 0.72rem; color: var(--text-light); margin-top: 0.15rem; }
    .phone-cell, .email-cell { color: var(--text-light); }
    .email-cell a { color: var(--primary); text-decoration: none; }
    .email-cell a:hover { text-decoration: underline; }
    .site-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      color: var(--primary); text-decoration: none; font-size: 0.82rem;
      padding: 0.25rem 0.6rem; border: 1px solid var(--border); border-radius: 6px;
      transition: background 0.12s, border-color 0.12s;
    }
    .site-link:hover { background: #f0f4ff; border-color: var(--primary); }
    .site-link svg { width: 12px; height: 12px; }
    .date-cell { color: var(--text); white-space: nowrap; }
    .date-cell .time-sub { font-size: 0.72rem; color: var(--text-light); display: block; }
    .pr-none { color: var(--text-light); font-size: 0.8rem; }
    .pr-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #fef3c7; color: #92400e; font-weight: 600;
      padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.78rem;
      text-decoration: none; transition: background 0.12s;
    }
    .pr-badge:hover { background: #fde68a; }
    .action-cell { display: flex; gap: 0.5rem; align-items: center; }
    .btn-edit {
      padding: 0.4rem 0.875rem; background: var(--primary); color: #fff;
      border: none; border-radius: 7px; font-size: 0.8rem; cursor: pointer;
      font-family: 'Montserrat', sans-serif; font-weight: 600;
      transition: background 0.13s; white-space: nowrap;
    }
    .btn-edit:hover { background: var(--primary-light); }
    .btn-gh {
      padding: 0.4rem 0.6rem; background: var(--card); color: var(--text-light);
      border: 1.5px solid var(--border); border-radius: 7px; font-size: 0.75rem;
      cursor: pointer; font-family: 'Open Sans', sans-serif;
      transition: border-color 0.13s, color 0.13s; text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .btn-gh:hover { border-color: var(--primary); color: var(--primary); }
    .empty-row td { text-align: center; padding: 3rem; color: var(--text-light); font-size: 0.9rem; }
    .error-msg { color: var(--red); }

    /* ── Stats ── */
    .stats-bar { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .stat-chip {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.4rem 0.875rem; font-size: 0.8rem; color: var(--text-light);
    }
    .stat-chip strong { color: var(--text); font-family: 'Montserrat', sans-serif; }
    .stat-chip.warn strong { color: var(--orange); }
  </style>
</head>
<body>

<div class="topbar" id="topbar" style="display:none">
  Sivutnopeasti — Admin
  <div class="topbar-right">
    <button class="logout-btn" onclick="doLogout()">Kirjaudu ulos</button>
  </div>
</div>

<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <h2>Admin-kirjautuminen</h2>
    <p>Syötä admin-avain. Tiedot tallennetaan selaimeesi — kirjautuminen tarvitaan vain kerran.</p>
    <div class="form-group">
      <label>Admin-avain</label>
      <input type="password" id="adminkey-input" placeholder="••••••••••••••••" autocomplete="off">
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Kirjaudu</button>
    <div class="login-status" id="login-status"></div>
  </div>
</div>

<div class="main" id="main-content" style="display:none">
  <div class="toolbar">
    <h1>Asiakkaat <span class="customer-count" id="customer-count"></span></h1>
    <div class="spacer"></div>
    <input type="text" class="search-input" id="search-input" placeholder="Hae yritystä..." oninput="filterTable()">
    <button class="refresh-btn" id="refresh-btn" onclick="loadCustomers()">&#8635; Päivitä</button>
  </div>

  <div class="loading-bar" id="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="stats-bar" id="stats-bar"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Yritys</th>
          <th>Puhelin</th>
          <th>Sähköposti</th>
          <th>Sivusto</th>
          <th class="sortable active" onclick="sortBy('date')">
            Päivitetty <span class="sort-icon" id="sort-date">&#8595;</span>
          </th>
          <th>PR</th>
          <th>Toiminnot</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr class="empty-row"><td colspan="7">Ladataan...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const WORKER_URL   = 'https://paivita.kappe-gm.workers.dev';
const PAIVITA_URL  = 'https://sivutnopeasti.github.io/paivita/';
const LS_ADMIN_KEY = 'sivutnopeasti_admin_key';

let adminKey  = null;
let customers = [];
let sortDir   = 'desc';

// ─── Init ────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const stored = localStorage.getItem(LS_ADMIN_KEY);
  if (stored) {
    adminKey = stored;
    showMain();
    loadCustomers();
  }
  document.getElementById('adminkey-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

// ─── Auth ────────────────────────────────────────────────────────
async function doLogin() {
  const key  = document.getElementById('adminkey-input').value.trim();
  const btn  = document.getElementById('login-btn');
  const stat = document.getElementById('login-status');

  if (!key) { stat.className = 'login-status error'; stat.textContent = 'Syötä admin-avain.'; return; }

  btn.disabled = true;
  btn.textContent = 'Tarkistetaan...';
  stat.className = 'login-status'; stat.textContent = '';

  // Verify by calling /github/data — 403 = wrong key, 200 = ok
  try {
    const r = await fetch(WORKER_URL + '/github/data', {
      headers: { 'Authorization': 'Bearer ADMIN:' + key },
    });
    if (r.status === 403) throw new Error('Väärä admin-avain');
    if (!r.ok) throw new Error('Worker-virhe ' + r.status);
    const data = await r.json();

    adminKey = key;
    localStorage.setItem(LS_ADMIN_KEY, key);
    showMain();
    renderCustomers(data.customers || []);
  } catch (e) {
    stat.className = 'login-status error';
    stat.textContent = 'Virhe: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Kirjaudu';
  }
}

function doLogout() {
  localStorage.removeItem(LS_ADMIN_KEY);
  adminKey = null; customers = [];
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('adminkey-input').value = '';
  document.getElementById('login-status').textContent = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Kirjaudu';
}

function showMain() {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';
}

// ─── Load customers ──────────────────────────────────────────────
async function loadCustomers() {
  const btn = document.getElementById('refresh-btn');
  const bar = document.getElementById('loading-bar');
  btn.disabled = true;
  bar.classList.add('active');
  setTableBody('<tr class="empty-row"><td colspan="7">Ladataan asiakkaita...</td></tr>');
  document.getElementById('stats-bar').innerHTML = '';

  try {
    const r = await fetch(WORKER_URL + '/github/data', {
      headers: { 'Authorization': 'Bearer ADMIN:' + adminKey },
    });
    if (r.status === 403) { doLogout(); return; }
    if (!r.ok) throw new Error('Worker-virhe ' + r.status);
    const data = await r.json();
    renderCustomers(data.customers || []);
  } catch (e) {
    setTableBody('<tr class="empty-row"><td colspan="7" class="error-msg">Virhe: ' + e.message + '</td></tr>');
  } finally {
    btn.disabled = false;
    bar.classList.remove('active');
  }
}

// ─── Render ──────────────────────────────────────────────────────
function renderCustomers(data) {
  customers = data;
  sortCustomers();
  renderTable();
  renderStats();
}

function sortCustomers() {
  customers.sort((a, b) => {
    const da = new Date(a.lastCommit), db = new Date(b.lastCommit);
    return sortDir === 'desc' ? db - da : da - db;
  });
}

function sortBy() {
  sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  document.getElementById('sort-date').textContent = sortDir === 'desc' ? '\u2193' : '\u2191';
  sortCustomers();
  renderTable();
}

function filterTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let visible = 0;
  document.querySelectorAll('#table-body tr[data-search]').forEach(row => {
    const match = row.dataset.search.includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('customer-count').textContent = '(' + visible + ' / ' + customers.length + ')';
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  if (!customers.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Ei asiakkaita löydetty.</td></tr>';
    document.getElementById('customer-count').textContent = '';
    return;
  }

  tbody.innerHTML = customers.map(c => {
    const dateStr   = formatDate(c.lastCommit);
    const timeStr   = formatTime(c.lastCommit);
    const label     = c.isCreation ? 'Luotu' : 'Päivitetty';
    const prCount   = (c.openPRs || []).length;
    const prCell    = prCount === 0
      ? '<span class="pr-none">\u2013</span>'
      : '<a class="pr-badge" href="' + c.ghPRsUrl + '" target="_blank" rel="noopener">\u26A0 ' + prCount + ' kuva-PR</a>';
    const search    = (c.company + ' ' + (c.phone || '') + ' ' + (c.email || '')).toLowerCase();
    const repoShort = (c.repo || '').split('/')[1] || c.repo;

    return '<tr data-search="' + escHtml(search) + '">' +
      '<td><div class="company-name">' + escHtml(c.company || '\u2014') + '</div>' +
           '<div class="company-sub">#' + c.issueNumber + ' \u00B7 ' + escHtml(repoShort) + '</div></td>' +
      '<td class="phone-cell">' + escHtml(c.phone || '\u2014') + '</td>' +
      '<td class="email-cell">' + (c.email ? '<a href="mailto:' + escHtml(c.email) + '">' + escHtml(c.email) + '</a>' : '\u2014') + '</td>' +
      '<td>' + (c.siteUrl
        ? '<a class="site-link" href="' + escHtml(c.siteUrl) + '" target="_blank" rel="noopener">' +
          '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V9M9 1h6m0 0v6m0-6L7 9"/></svg>Avaa</a>'
        : '\u2014') + '</td>' +
      '<td class="date-cell">' + dateStr + '<span class="time-sub">' + label + ' \u00B7 ' + timeStr + '</span></td>' +
      '<td>' + prCell + '</td>' +
      '<td><div class="action-cell">' +
        (c.siteId
          ? '<button class="btn-edit" onclick="openEditor(' + JSON.stringify(c.siteId) + ')">Muokkaa</button>'
          : '<button class="btn-edit" disabled style="opacity:0.4">Muokkaa</button>') +
        '<a class="btn-gh" href="https://github.com/' + escHtml(c.repo) + '" target="_blank" rel="noopener" title="GitHub">GH</a>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  document.getElementById('customer-count').textContent = '(' + customers.length + ' asiakasta)';
}

function renderStats() {
  const totalPR = customers.reduce((s, c) => s + (c.openPRs || []).length, 0);
  document.getElementById('stats-bar').innerHTML =
    '<div class="stat-chip"><strong>' + customers.length + '</strong> asiakasta</div>' +
    '<div class="stat-chip ' + (totalPR > 0 ? 'warn' : '') + '"><strong>' + totalPR + '</strong> avoin kuva-PR' + (totalPR !== 1 ? ':t\u00E4' : '') + '</div>';
}

function setTableBody(html) {
  document.getElementById('table-body').innerHTML = html;
  document.getElementById('customer-count').textContent = '';
}

// ─── Editor SSO ─────────────────────────────────────────────────
function openEditor(siteId) {
  localStorage.setItem(LS_ADMIN_KEY, adminKey);
  window.open(PAIVITA_URL + '?admin&sid=' + encodeURIComponent(siteId), '_blank', 'noopener');
}

// ─── Utils ───────────────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '\u2014';
  return new Date(iso).toLocaleDateString('fi-FI', { day: 'numeric', month: 'numeric', year: 'numeric' });
}
function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit' });
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
